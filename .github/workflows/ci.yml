name: CI — Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint-and-validate:
    name: Lint & Static Checks
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config --quiet

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: error        # warnings are ok, only errors fail

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

      - name: Validate shell script syntax
        run: bash -n Start_project.sh

      - name: Verify secrets are not tracked by git
        run: |
          if git ls-files | grep -q "db_password.txt"; then
            echo "ERROR: db_password.txt is committed — remove it immediately"
            exit 1
          fi
          echo "OK: No secrets tracked"

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker          # ← KEY FIX: 'docker' driver exposes images
                                  # to the local daemon so docker inspect works.
                                  # Default 'docker-container' driver does NOT.

      - name: Build backend image
        run: |
          docker build -t backend-secure:v1 ./backend

      - name: Build frontend image
        run: |
          docker build -t frontend-secure:v1 ./frontend

      - name: Show image sizes
        run: |
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" \
            | grep -E "backend-secure|frontend-secure"

      - name: Enforce backend image size limit (200 MB)
        run: |
          SIZE=$(docker inspect backend-secure:v1 \
            --format='{{.Size}}')
          echo "Backend image size: $SIZE bytes"
          LIMIT=209715200   # 200 MB in bytes
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "FAIL: Backend image ($SIZE bytes) exceeds 200 MB limit"
            exit 1
          fi
          echo "OK: Backend image is within size limit"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend for scanning
        run: docker build -t backend-secure:v1 ./backend

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend-secure:v1
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Build frontend for scanning
        run: docker build -t frontend-secure:v1 ./frontend

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend-secure:v1
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
